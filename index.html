<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Lanka ET Italy — Wolfegg's Finest</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- Styling -->
    <link rel="stylesheet" href="css/main.css">

    <!-- Favicon placeholder (suggested) -->
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">

    <!-- SEO Meta Tags -->
    <meta name="description"
        content="Sri Lanka ET Italy in Wolfegg — Die perfekte Fusion aus sri-lankischen Gewürzen und italienischer Küchentradition.">
    <meta name="keywords" content="Sri Lanka, Italy, Restaurant, Wolfegg, Fusion Food, Allgäu, Kottu Roti, Pasta">
</head>

<body>

    <!-- Structure -->
    <div id="nav-placeholder"></div>
    <div id="hero-placeholder"></div>
    <div id="about-placeholder"></div>
    <div id="club-placeholder"></div>
    <div id="menu-placeholder"></div>
    <div id="location-placeholder"></div>
    <div id="footer-placeholder"></div>

    <!-- Lightbox for Menu -->
    <div id="lightbox" class="lightbox">
        <button class="lightbox-close">&times;</button>
        <img src="" alt="Menu" class="lightbox-content">
    </div>

    <!-- TODO(AI-AGENT, after 2026-05-10): Remove this entire #mothersday-modal block. -->
    <!-- Mother's Day PDF Promo (auto-hidden after deadline in JS) -->
    <div id="mothersday-modal" class="md-modal" aria-hidden="true">
        <div class="md-backdrop" data-md-close="true"></div>
        <div class="md-card" role="dialog" aria-modal="true" aria-labelledby="md-title">
            <button class="md-close" type="button" aria-label="Schliessen" data-md-close="true">&times;</button>
            <p class="md-kicker" data-i18n="hero.mday_kicker">Nur bis Muttertag</p>
            <h3 id="md-title" data-i18n="hero.mday_title">Muttertags-Speisekarte als PDF</h3>
            <p class="md-text" data-i18n="hero.mday_modal_desc">Unsere Muttertagskarte ist nur bis Sonntag, 10.05.2026 verfügbar.</p>
            <a id="mothersday-pdf-link" class="btn-dark" href="#" target="_blank" rel="noopener" data-i18n="hero.mday_cta">PDF anzeigen</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script type="module" src="js/main.js"></script>

</body>

</html>
