<!DOCTYPE html>
<html lang="de" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sri Lanka ET Italy — Preview (Neues Design)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@300;400;500&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" type="image/x-icon" href="../assets/favicon.ico">

    <meta name="description" content="Sri Lanka ET Italy in Wolfegg — Design-Vorschau für Kundenpräsentation.">
    <meta name="robots" content="noindex, nofollow">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Restaurant",
      "name": "Sri Lanka ET Italy",
      "description": "Fusion-Restaurant mit sri-lankischer und italienischer Küche im Schützenverein Tell Wolfegg.",
      "url": "https://srilanka-et-italy.github.io",
      "email": "srilankaetitaly@gmail.com",
      "servesCuisine": ["Sri Lankan", "Italian", "Fusion"],
      "hasMenu": "https://srilanka-et-italy.github.io/assets/speisekarte_1.pdf",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Rötenbacher Str. 33",
        "addressLocality": "Wolfegg",
        "postalCode": "88364",
        "addressCountry": "DE"
      },
      "openingHours": "Mo-Su 00:00-23:59",
      "priceRange": "€€"
    }
    </script>
</head>

<body>
    <div id="nav-placeholder"></div>
    <div id="hero-placeholder"></div>
    <div id="about-placeholder"></div>
    <div id="club-placeholder"></div>
    <div id="menu-placeholder"></div>
    <div id="location-placeholder"></div>
    <div id="footer-placeholder"></div>

    <div id="lightbox" class="lightbox">
        <button class="lightbox-close">&times;</button>
        <img src="" alt="Menu" class="lightbox-content">
    </div>

    <div id="mothersday-modal" class="md-modal" aria-hidden="true">
        <div class="md-backdrop" data-md-close="true"></div>
        <div class="md-card" role="dialog" aria-modal="true" aria-labelledby="md-title">
            <button class="md-close" type="button" aria-label="Schliessen" data-md-close="true">&times;</button>
            <p class="md-kicker">Nur bis Muttertag</p>
            <h3 id="md-title">Muttertags-Speisekarte als PDF</h3>
            <p class="md-text">Unsere Muttertagskarte ist nur bis Sonntag, 10.05.2026 verfügbar.</p>
            <a id="mothersday-pdf-link" class="btn-glow" href="#" target="_blank" rel="noopener">PDF anzeigen</a>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
